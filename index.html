        <div id="page-content">
            <noscript>
                <div style="max-width:800px;margin:60px auto;font-family:Inter,sans-serif;color:#333;line-height:1.7">
                    <h2>Open Mission Control</h2>
                    <p>A free, open-source mission control UI for AI agent orchestration. Built to work with OpenClaw or any AI agent framework of your choice.</p>
                    <p>Open Mission Control gives you a complete command center interface to monitor, manage, and coordinate a fleet of AI agents. It includes a real-time dashboard, agent management across departments, a Kanban task board, heartbeat monitoring with configurable checklist cycles, per-agent chat, a team board chat with mentions, an activity feed, cron job scheduling, a skill system with detailed instructions, per-agent memory, and full system settings with data export and import.</p>
                    <p>The UI runs entirely in the browser with no server required. All data is stored in localStorage with simulated agents so you can explore every feature immediately. When you are ready to go to production, point your AI coding tool at this codebase and let it build the real backend — you choose the stack, the database, and the agent framework.</p>
                    <p>Built with vanilla HTML, CSS, and JavaScript. No build step, no frameworks, no dependencies to install. Uses Tailwind CSS, Lucide Icons, and Google Fonts via CDN.</p>
                    <p><strong>Please enable JavaScript to use Open Mission Control.</strong></p>
                </div>
            </noscript>
        </div>
    </main>
